name: Build IPA

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Archive (no signing)
        run: |
          xcodebuild \
            -project OcrServer.xcodeproj \
            -scheme OcrServer \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $PWD/build/OcrServer.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            archive

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -r build/OcrServer.xcarchive/Products/Applications/OcrServer.app Payload/
          zip -r OcrServer.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: OcrServer-unsigned
          path: OcrServer.ipa
